<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Dashboard | The Concept Warriors LMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/jpeg" href="idea.jpeg" />
  <link rel="stylesheet" href="lms-dashboard.css">
</head>
<body>

<button id="mobilemenutoggle" class="mobile-menu-toggle" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>

<div class="lms-layout">
  <!-- SIDEBAR -->
  <aside class="lms-sidebar" id="lmsSidebar">
    <div class="lms-sidebar-header">
      <div class="lms-sidebar-logo nav-logo">
        <div class="logo-icon"><i class="fas fa-bolt"></i></div>
        <div class="logo-text">
          <span class="logo-brand">Concept Warriors</span>
          <span class="logo-sub">Student Portal</span>
        </div>
      </div>
    </div>

    <nav class="lms-nav">
      <p class="nav-section-label">Main</p>
      <!-- <div class="lms-nav-item active" onclick="showSection('dashboard', this)">
        <i class="fas fa-th-large"></i><span>Dashboard</span>
      </div> -->
      <div class="lms-nav-item" onclick="showSection('lectures', this)">
        <i class="fas fa-play-circle"></i><span>Recorded Lectures</span>
      </div>
      <div class="lms-nav-item" onclick="showSection('notes', this)">
        <i class="fas fa-file-alt"></i><span>Notes & Materials</span>
      </div>
      <div class="lms-nav-item" onclick="showSection('assignments', this)">
        <i class="fas fa-tasks"></i><span>Assignments</span>
      </div>
      <div class="lms-nav-item" onclick="showSection('tests', this)">
        <i class="fas fa-clipboard-check"></i><span>Tests & Results</span>
      </div>
      <div class="lms-nav-item" onclick="showSection('downloads', this)">
        <i class="fas fa-download"></i><span>Download Notes</span>
      </div>
      </nav>
      <a href="index.html" class="lms-nav-item" style="margin-bottom:4px;"><i class="fas fa-home"></i><span>Main Website</span></a>
    
      </div> 
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="lms-main">
    <!-- TOPBAR -->
     <div class="main-container">
      <p>Harsh</p>
     </div>
  

  </main>
</div>

<script src="script.js"></script>
<script>
// Auth check
if (!localStorage.getItem('cw-lms-logged')) window.location.href = 'lms-login.html';

// Set user info
const userName = localStorage.getItem('cw-lms-user') || 'Student';
const initials = userName.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
['sidebarAvatar','topbarAvatar','profileAvatar'].forEach(id => {
  const el = document.getElementById(id);
  if (el) el.textContent = initials;
});
['sidebarName','greetName','profileName','profileFullName'].forEach(id => {
  const el = document.getElementById(id);
  if (el) el.textContent = userName;
});

function showSection(id, navItem) {
  document.querySelectorAll('.lms-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.lms-nav-item').forEach(i => i.classList.remove('active'));
  const section = document.getElementById(id);
  if (section) section.classList.add('active');
  if (navItem) navItem.classList.add('active');
  const title = document.getElementById('lmsPageTitle');
  if (title && navItem) title.textContent = navItem.querySelector('span')?.textContent || id;
  // Close mobile sidebar
  document.getElementById('lmsSidebar')?.classList.remove('open');
  document.getElementById('mobilemenutoggle').innerHTML = '<i class="fa-solid fa-bars"></i>';
}

function lmsLogout() {
  localStorage.removeItem('cw-lms-logged');
  localStorage.removeItem('cw-lms-user');
  window.location.href = 'lms-login.html';
}



function toggleSidebar() {
  const sidebar = document.getElementById('lmsSidebar');
  const btn = document.getElementById('mobilemenutoggle');

  sidebar.classList.toggle('open');

  const isOpen = btn.classList.toggle('open');

  btn.innerHTML = isOpen
    ? '<i class="fa-solid fa-xmark"></i>'
    : '<i class="fa-solid fa-bars"></i>';
}
  


function filterLectures(subject, btn) {
  document.querySelectorAll('#lecturesList > div').forEach(card => {
    if (subject === 'all' || card.dataset.subject === subject) {
      card.style.display = 'block';
    } else {
      card.style.display = 'none';
    }
  });
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
}

// Theme
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'light';
  const next = current === 'light' ? 'dark' : 'light';
  localStorage.setItem('cw-theme', next);
  document.documentElement.setAttribute('data-theme', next);
  const icon = document.getElementById('themeIcon');
  if (icon) icon.className = next === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
}
(function() {
  const saved = localStorage.getItem('cw-theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  const icon = document.getElementById('themeIcon');
  if (icon) icon.className = saved === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
})();
</script>
</body>
</html>
